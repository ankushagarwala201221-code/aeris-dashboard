<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>AERIS ADMIN</title>

<link rel="stylesheet" href="admin.css">

</head>

<body>

<div id="accessDenied">

<h1>ACCESS CONTROL</h1>

<p>Checking permissions...</p>

</div>

<div id="adminPanel" style="display:none;">

<header>

<h1>AERIS ADMIN CONTROL</h1>

<p>Secure System Dashboard</p>

</header>

<div class="grid">

<div class="card">

<h2>👥 Users</h2>

<div id="userCount">0</div>

</div>

<div class="card">

<h2>📡 System</h2>

<div id="systemStatus">Loading...</div>

</div>

<div class="card">

<h2>⚠ Alerts</h2>

<div id="alertCount">0</div>

</div>

<div class="card">

<h2>🔧 Controls</h2>

<button id="resetBtn">Reset Live Data</button>

</div>

</div>

<div class="panel">

<h2>LIVE DATABASE</h2>

<pre id="liveData"></pre>

</div>

</div>

<script type="module" src="admin.js"></script>

</body>

</html>
