<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AERIS - Kolkata Smart Monitoring</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{

margin:0;

font-family:Poppins;

background:linear-gradient(135deg,#050816,#0a1026,#111b3a);

color:white;

overflow-x:hidden;

}

/* HEADER */

header{

text-align:center;

padding:25px;

}

h1{

font-size:3rem;

color:#00ffff;

text-shadow:0 0 25px rgba(0,255,255,0.4);

}

.location{

color:#aaa;

}

/* GRID */

.container{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(220px,1fr));

gap:15px;

padding:15px;

}

/* CARD */

.card{

background:rgba(255,255,255,0.05);

border:1px solid rgba(255,255,255,0.08);

padding:20px;

border-radius:18px;

backdrop-filter:blur(12px);

transition:0.3s;

position:relative;

}

.card:hover{

transform:translateY(-5px);

box-shadow:0 0 25px rgba(0,255,255,0.2);

}

.value{

font-size:2.2rem;

font-weight:600;

}

/* STATUS COLORS */

.safe{color:#00ff99;}

.mid{color:#ffd000;}

.danger{color:#ff4444;}

/* LIVE DOT */

.dot{

width:10px;

height:10px;

background:#00ff99;

display:inline-block;

border-radius:50%;

animation:pulse 1s infinite;

margin-left:8px;

}

@keyframes pulse{

0%{transform:scale(1);}
50%{transform:scale(1.6);opacity:0.5;}
100%{transform:scale(1);}

}

/* POPUP */

.popup{

position:fixed;

top:15px;

right:15px;

background:rgba(0,255,255,0.12);

padding:12px;

border-radius:10px;

border:1px solid cyan;

animation:fade 5s forwards;

}

@keyframes fade{

0%{opacity:0;}
10%{opacity:1;}
80%{opacity:1;}
100%{opacity:0;}

}

/* CHART */

.chart{

width:90%;

margin:auto;

background:rgba(255,255,255,0.05);

padding:15px;

border-radius:15px;

}

/* IMAGE */

img{

width:100%;

border-radius:12px;

margin-top:10px;

}

</style>

</head>

<body>

<!-- HEADER -->

<header>

<h1>AERIS <span class="dot"></span></h1>

<div class="location">📍 Kolkata, India</div>

</header>

<!-- POPUP -->

<div id="popup" class="popup">System Initializing...</div>

<!-- SENSOR CARDS -->

<div class="container">

<div class="card">

<h3>Temperature</h3>

<div id="temp" class="value">--</div>

</div>

<div class="card">

<h3>Humidity</h3>

<div id="hum" class="value">--</div>

</div>

<div class="card">

<h3>PM2.5</h3>

<div id="pm" class="value">--</div>

</div>

<div class="card">

<h3>VRI</h3>

<div id="vri" class="value">--</div>

<div id="status"></div>

</div>

<div class="card">

<h3>Prediction</h3>

<div id="pred" class="value">--</div>

</div>

</div>

<!-- IMAGE SECTION -->

<div class="container">

<div class="card">

<h3>Visibility View</h3>

<img src="https://images.unsplash.com/photo-1501973801540-537f08ccae7b">

</div>

</div>

<!-- CHART -->

<div class="chart">

<canvas id="chart"></canvas>

</div>

<!-- FIREBASE -->

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* FIREBASE CONFIG */

const firebaseConfig = {

apiKey: "YOUR_API_KEY",

authDomain: "YOUR_AUTH_DOMAIN",

databaseURL: "YOUR_DATABASE_URL",

projectId: "YOUR_PROJECT_ID",

storageBucket: "YOUR_STORAGE_BUCKET",

messagingSenderId: "YOUR_SENDER_ID",

appId: "YOUR_APP_ID"

};

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

/* POPUP */

function popup(msg){

let d=document.createElement("div");

d.className="popup";

d.innerHTML=msg;

document.body.appendChild(d);

setTimeout(()=>d.remove(),4000);

}

/* BIND DATA */

function bind(path,id){

onValue(ref(db,path),(snap)=>{

document.getElementById(id).innerText=snap.val();

});

}

bind("/AERIS/Temperature","temp");

bind("/AERIS/Humidity","hum");

bind("/AERIS/PM25","pm");

bind("/AERIS/VRI","vri");

bind("/AERIS/PRED","pred");

/* STATUS */

onValue(ref(db,"/AERIS/VRI"),(snap)=>{

let v=snap.val();

let s=document.getElementById("status");

if(v>=75){

s.innerHTML="SAFE VISIBILITY";

s.className="safe";

popup("🌿 Excellent air quality in Kolkata");

}

else if(v>=50){

s.innerHTML="MODERATE VISIBILITY";

s.className="mid";

popup("🌫 Moderate haze detected");

}

else{

s.innerHTML="DANGER VISIBILITY";

s.className="danger";

popup("🚨 Danger! Low visibility in Kolkata");

}

});

/* CHART */

const ctx=document.getElementById("chart");

const chart=new Chart(ctx,{

type:"line",

data:{

labels:[],

datasets:[{

label:"VRI",

data:[],

borderColor:"#00ffff",

tension:0.3

}]

}

});

onValue(ref(db,"/AERIS/VRI"),(snap)=>{

let v=snap.val();

chart.data.labels.push(new Date().toLocaleTimeString());

chart.data.datasets[0].data.push(v);

if(chart.data.labels.length>10){

chart.data.labels.shift();

chart.data.datasets[0].data.shift();

}

chart.update();

});

</script>

</body>

</html>
