<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AERIS LOGIN SYSTEM</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Poppins',sans-serif;

background:
linear-gradient(135deg,#050816,#0a1026,#111b3a);

color:white;

min-height:100vh;

overflow-x:hidden;

display:flex;

justify-content:center;

align-items:center;

}

/* GLOW */

body::before{

content:"";

position:fixed;

width:600px;
height:600px;

background:cyan;

filter:blur(220px);

opacity:0.10;

top:-200px;
left:-150px;

z-index:-1;

}

body::after{

content:"";

position:fixed;

width:500px;
height:500px;

background:#00ff88;

filter:blur(220px);

opacity:0.08;

bottom:-150px;
right:-120px;

z-index:-1;

}

/* LOGIN BOX */

.auth-box{

width:420px;

background:rgba(255,255,255,0.05);

padding:40px;

border-radius:30px;

backdrop-filter:blur(15px);

border:1px solid rgba(255,255,255,0.08);

box-shadow:0 0 30px rgba(0,255,255,0.15);

animation:fadeUp 1s ease;

}

.auth-box h1{

text-align:center;

font-size:2.8rem;

color:#00ffff;

margin-bottom:10px;

text-shadow:0 0 15px cyan;

}

.auth-box p{

text-align:center;

color:#aaa;

margin-bottom:30px;

}

.auth-box input{

width:100%;

padding:16px;

margin-bottom:20px;

border:none;

outline:none;

border-radius:15px;

background:rgba(255,255,255,0.08);

color:white;

font-size:1rem;

}

.auth-box input::placeholder{

color:#bbb;

}

.buttons{

display:flex;

flex-direction:column;

gap:15px;

}

.buttons button{

padding:15px;

border:none;

border-radius:15px;

font-size:1rem;

font-family:Poppins;

cursor:pointer;

transition:0.3s;

background:rgba(0,255,255,0.12);

color:white;

}

.buttons button:hover{

background:cyan;

color:black;

transform:scale(1.03);

}

#userInfo{

margin-top:25px;

text-align:center;

font-size:1rem;

color:#00ff99;

line-height:1.6;

}

/* DASHBOARD */

#dashboard{

display:none;

width:100%;

padding:40px;

text-align:center;

}

#dashboard h1{

font-size:3rem;

color:#00ffff;

margin-bottom:20px;

text-shadow:0 0 20px cyan;

}

#dashboard p{

color:#aaa;

font-size:1.1rem;

}

.card{

width:300px;

margin:40px auto;

background:rgba(255,255,255,0.05);

padding:30px;

border-radius:25px;

backdrop-filter:blur(15px);

border:1px solid rgba(255,255,255,0.08);

}

.card h2{

color:#00ffff;

margin-bottom:15px;

}

.card .value{

font-size:3rem;

font-weight:600;

}

/* POPUP */

.popup{

position:fixed;

top:20px;

right:20px;

padding:15px 20px;

border-radius:15px;

background:rgba(0,255,255,0.12);

border:1px solid cyan;

backdrop-filter:blur(12px);

opacity:0;

transition:0.5s;

z-index:999;

}

/* ANIMATION */

@keyframes fadeUp{

0%{

opacity:0;

transform:translateY(30px);

}

100%{

opacity:1;

transform:translateY(0px);

}

}

</style>

</head>

<body>

<!-- LOGIN PAGE -->

<div id="loginPage" class="auth-box">

<h1>AERIS</h1>

<p>

Secure Environmental Monitoring Access

</p>

<input type="email" id="email" placeholder="Enter Email">

<input type="password" id="password" placeholder="Enter Password">

<div class="buttons">

<button id="signupBtn">

Create Account

</button>

<button id="loginBtn">

Login

</button>

<button id="googleBtn">

Continue With Google

</button>

<button id="logoutBtn">

Logout

</button>

</div>

<div id="userInfo">

🔴 Not Logged In

</div>

</div>

<!-- DASHBOARD -->

<div id="dashboard">

<h1>AERIS DASHBOARD</h1>

<p>

Advanced Environmental Visibility Monitoring System

</p>

<div class="card">

<h2>📡 VRI</h2>

<div class="value" id="vri">

82

</div>

</div>

</div>

<!-- POPUP -->

<div id="popup" class="popup"></div>

<script type="module">

import { initializeApp }

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
GoogleAuthProvider,
signInWithPopup,
signOut,
onAuthStateChanged

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* FIREBASE CONFIG */

const firebaseConfig = {

apiKey: "AIzaSyCFcOMkIMOSLhVuw_iFpBdrH5w2ABDMsXc",

authDomain: "aeris-dashboard.firebaseapp.com",

projectId: "aeris-dashboard",

storageBucket: "aeris-dashboard.firebasestorage.app",

messagingSenderId: "782547152481",

appId: "1:782547152481:web:5dd3b9ccc6cde3dc04c420"

};

/* INIT */

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const provider = new GoogleAuthProvider();

/* ELEMENTS */

const loginPage =
document.getElementById("loginPage");

const dashboard =
document.getElementById("dashboard");

const userInfo =
document.getElementById("userInfo");

/* POPUP */

function showPopup(msg){

const popup =
document.getElementById("popup");

popup.innerHTML = msg;

popup.style.opacity = "1";

setTimeout(()=>{

popup.style.opacity = "0";

},4000);

}

/* SIGNUP */

document.getElementById("signupBtn")

.addEventListener("click",()=>{

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

createUserWithEmailAndPassword(

auth,
email,
password

)

.then((userCredential)=>{

showPopup("🟢 Account Created Successfully");

})

.catch((error)=>{

showPopup("❌ " + error.message);

});

});

/* LOGIN */

document.getElementById("loginBtn")

.addEventListener("click",()=>{

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

signInWithEmailAndPassword(

auth,
email,
password

)

.then((userCredential)=>{

showPopup("🟢 Login Successful");

})

.catch((error)=>{

showPopup("❌ " + error.message);

});

});

/* GOOGLE LOGIN */

document.getElementById("googleBtn")

.addEventListener("click",()=>{

signInWithPopup(auth,provider)

.then((result)=>{

showPopup("☁ Google Login Successful");

})

.catch((error)=>{

showPopup("❌ " + error.message);

console.log(error);

});

});

/* LOGOUT */

document.getElementById("logoutBtn")

.addEventListener("click",()=>{

signOut(auth)

.then(()=>{

showPopup("🚪 Logged Out");

});

});

/* AUTH STATE */

onAuthStateChanged(auth,(user)=>{

if(user){

loginPage.style.display = "none";

dashboard.style.display = "block";

userInfo.innerHTML =

"🟢 Logged in as:<br>" +

user.email;

showPopup("☁ Connected To AERIS Cloud");

console.log(user);

}

else{

loginPage.style.display = "block";

dashboard.style.display = "none";

userInfo.innerHTML =

"🔴 Authentication Required";

}

});

</script>

</body>
</html>
