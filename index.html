<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AERIS LOGIN SYSTEM</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00ffff">
</head>

<body>

<!-- LOGIN PAGE -->

<div id="loginPage" class="auth-box">

<h1>AERIS</h1>

<p>
Secure Environmental Monitoring Access
</p>

<input type="email" id="email" placeholder="Enter Email">

<input type="password" id="password" placeholder="Enter Password">

<div class="buttons">

<button id="loginBtn">
Login
</button>

<button id="googleBtn">
Continue With Google
</button>

<button onclick="window.location.href='signup.html'">
Create Account
</button>

</div>

<div id="userInfo">
🔴 Not Logged In
</div>

</div>

<!-- POPUP -->

<div id="popup" class="popup"></div>

<script type="module" src="app.js"></script>
<script>
if("serviceWorker" in navigator){

navigator.serviceWorker
.register("./aeris-dashboard/service-worker.js")

.then(()=>{

console.log("AERIS PWA Ready");

});

}
</script>
</body>
</html>
