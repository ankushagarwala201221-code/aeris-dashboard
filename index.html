<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AERIS NEXT GEN DASHBOARD</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{

  margin:0;

  font-family:Poppins;

  background:linear-gradient(135deg,#050816,#0a1026,#111b3a);

  color:white;

}

/* HEADER */

header{

  text-align:center;

  padding:30px;

}

h1{

  color:#00ffff;

  font-size:3rem;

}

/* GRID */

.container{

  display:grid;

  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));

  gap:20px;

  padding:20px;
}

/* CARD */

.card{

  background:rgba(255,255,255,0.05);

  padding:20px;

  border-radius:20px;

  backdrop-filter:blur(10px);

  border:1px solid rgba(255,255,255,0.1);

}

/* STATUS */

.safe{color:#00ff99;}

.mid{color:#ffd000;}

.danger{color:#ff4444;}

/* POPUP */

.popup{

  position:fixed;

  top:20px;

  right:20px;

  background:rgba(0,255,255,0.1);

  padding:15px;

  border:1px solid cyan;

  border-radius:10px;

  animation:fade 5s forwards;
}

@keyframes fade{

  0%{opacity:0}
  10%{opacity:1}
  80%{opacity:1}
  100%{opacity:0}
}

/* CHART */

.chart-box{

  width:90%;

  margin:auto;

  background:rgba(255,255,255,0.05);

  padding:20px;

  border-radius:20px;
}

</style>

</head>

<body>

<header>

<h1>AERIS AI DASHBOARD</h1>

<p>Live Environmental Monitoring System</p>

</header>

<!-- POPUP -->

<div id="popup" class="popup">System Starting...</div>

<!-- LIVE DATA -->

<div class="container">

<div class="card">

<h2>Temperature</h2>

<h1 id="temp">--</h1>

</div>

<div class="card">

<h2>Humidity</h2>

<h1 id="hum">--</h1>

</div>

<div class="card">

<h2>PM2.5</h2>

<h1 id="pm">--</h1>

</div>

<div class="card">

<h2>VRI</h2>

<h1 id="vri">--</h1>

<p id="status">Loading...</p>

</div>

<div class="card">

<h2>Prediction</h2>

<h1 id="pred">--</h1>

</div>

</div>

<!-- CHART -->

<div class="chart-box">

<canvas id="chart"></canvas>

</div>

<!-- FIREBASE -->

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {

apiKey:"YOUR_API_KEY",

authDomain:"YOUR_AUTH_DOMAIN",

databaseURL:"YOUR_DATABASE_URL",

projectId:"YOUR_PROJECT_ID",

storageBucket:"YOUR_BUCKET",

messagingSenderId:"YOUR_ID",

appId:"YOUR_APPID"

};

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

// CHART

const ctx = document.getElementById("chart");

const chart = new Chart(ctx,{

type:"line",

data:{

labels:[],

datasets:[

{

label:"VRI",

data:[],

borderColor:"#00ffff"

}

]

}

});

// FIREBASE

function bind(path,id){

onValue(ref(db,path),(snap)=>{

document.getElementById(id).innerText = snap.val();

});

}

bind("/AERIS/Temperature","temp");

bind("/AERIS/Humidity","hum");

bind("/AERIS/PM25","pm");

bind("/AERIS/VRI","vri");

bind("/AERIS/PRED","pred");

// STATUS

onValue(ref(db,"/AERIS/VRI"),(snap)=>{

let v = snap.val();

let status = document.getElementById("status");

if(v>=75){

status.innerHTML="SAFE";

status.className="safe";

}

else if(v>=50){

status.innerHTML="MODERATE";

status.className="mid";

}

else{

status.innerHTML="DANGER";

status.className="danger";

}

});

// CHART UPDATE

onValue(ref(db,"/AERIS/VRI"),(snap)=>{

let v = snap.val();

let t = new Date().toLocaleTimeString();

chart.data.labels.push(t);

chart.data.datasets[0].data.push(v);

if(chart.data.labels.length>10){

chart.data.labels.shift();

chart.data.datasets[0].data.shift();

}

chart.update();

});

// POPUP

setTimeout(()=>{

document.getElementById("popup").innerText="Firebase Connected";

},2000);

</script>

</body>

</html>
