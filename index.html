<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AERIS Dashboard</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>AERIS Environmental Station</h1>

<div class="container">

<div class="card" onclick="showInfo('temp')">

<h2>🌡 Temperature</h2>

<p id="temp">Loading...</p>

</div>

<div class="card" onclick="showInfo('humidity')">

<h2>💧 Humidity</h2>

<p id="humidity">Loading...</p>

</div>

<div class="card" onclick="showInfo('pm')">

<h2>🌫 PM2.5</h2>

<p id="pm25">Loading...</p>

</div>

<div class="card" onclick="showInfo('vri')">

<h2>👁 VRI</h2>

<p id="vri">Loading...</p>

</div>

</div>

<hr>

<div id="details">

<h2>Sensor Information</h2>

<p>Click any card above.</p>

</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script src="script.js"></script>

</body>

</html>
