<!DOCTYPE html>
<html>

<head>

  <title>AERIS Dashboard</title>

  <style>

    body {

      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
      padding-top: 50px;
    }

    .card {

      background: #222;
      margin: 20px auto;
      padding: 20px;
      width: 300px;
      border-radius: 15px;
    }

    h1 {

      color: cyan;
    }

  </style>

</head>

<body>

  <h1>AERIS LIVE DASHBOARD</h1>

  <div class="card">

    <h2>Temperature</h2>

    <h3 id="temp">--</h3>

  </div>

  <div class="card">

    <h2>Humidity</h2>

    <h3 id="hum">--</h3>

  </div>

  <div class="card">

    <h2>PM2.5</h2>

    <h3 id="pm">--</h3>

  </div>

  <div class="card">

    <h2>VRI</h2>

    <h3 id="vri">--</h3>

  </div>

  <script type="module">

    import { initializeApp }

    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

    import {

      getDatabase,
      ref,
      onValue

    }

    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {

      apiKey: "AIzaSyCFcOMkIMOSLhVuw_iFpBdrH5w2ABDMsXc",

      authDomain: "aeris-dashboard.firebaseapp.com",

      databaseURL: "https://aeris-dashboard-default-rtdb.asia-southeast1.firebasedatabase.app/",

      projectId: "aeris-dashboard",

      storageBucket: "aeris-dashboard.firebasestorage.app",

      messagingSenderId: "782547152481",

      appId: "1:782547152481:web:5dd3b9ccc6cde3dc04c420"
    };

    const app = initializeApp(firebaseConfig);

    const db = getDatabase(app);

    onValue(ref(db, "AERIS/Temperature"), (snapshot) => {

      document.getElementById("temp").innerHTML =
      snapshot.val() + " °C";
    });

    onValue(ref(db, "AERIS/Humidity"), (snapshot) => {

      document.getElementById("hum").innerHTML =
      snapshot.val() + " %";
    });

    onValue(ref(db, "AERIS/PM25"), (snapshot) => {

      document.getElementById("pm").innerHTML =
      snapshot.val();
    });

    onValue(ref(db, "AERIS/VRI"), (snapshot) => {

      document.getElementById("vri").innerHTML =
      snapshot.val();
    });

  </script>

</body>
</html>
